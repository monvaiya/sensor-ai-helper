<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教师学情看板 - 传感器仿真AI纠错助手</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <!-- 教师看板头部 -->
        <header style="background: linear-gradient(90deg, #2c3e50, #34495e);">
            <h1><i class="fas fa-chalkboard-teacher"></i> 教师学情看板</h1>
            <p class="subtitle">传感器仿真实验教学数据分析平台</p>
            <a href="index.html" class="btn-teacher" style="position: absolute; top: 20px; right: 20px; padding: 8px 20px; font-size: 0.9rem;">
                <i class="fas fa-arrow-left"></i> 返回学生端
            </a>
        </header>

        <!-- 密码验证 -->
        <div id="passwordSection" class="card" style="max-width: 500px; margin: 50px auto;">
            <h2><i class="fas fa-lock"></i> 教师身份验证</h2>
            <p>请输入教师密码访问学情数据</p>
            <div class="input-group">
                <input type="password" id="teacherPassword" placeholder="请输入教师密码" style="width: 100%;">
            </div>
            <button onclick="verifyPassword()" class="btn-analyze" style="width: 100%;">
                <i class="fas fa-sign-in-alt"></i> 验证并进入
            </button>
        </div>

        <!-- 学情看板内容（默认隐藏） -->
        <div id="dashboardContent" style="display: none;">
            <!-- 概览统计 -->
            <section class="card">
                <h2><i class="fas fa-tachometer-alt"></i> 教学概览</h2>
                <div class="stats-grid">
                    <div class="stat-card" style="background: linear-gradient(135deg, #3498db, #2980b9);">
                        <h3>总分析次数</h3>
                        <p id="totalAnalysis" class="stat-number">0</p>
                        <p class="stat-desc">累计AI辅助分析次数</p>
                    </div>
                    <div class="stat-card" style="background: linear-gradient(135deg, #2ecc71, #27ae60);">
                        <h3>学生参与数</h3>
                        <p id="studentCount" class="stat-number">0</p>
                        <p class="stat-desc">使用系统的学生数量</p>
                    </div>
                    <div class="stat-card" style="background: linear-gradient(135deg, #9b59b6, #8e44ad);">
                        <h3>实验项目数</h3>
                        <p id="experimentCount" class="stat-number">5</p>
                        <p class="stat-desc">覆盖的实验类型数量</p>
                    </div>
                    <div class="stat-card" style="background: linear-gradient(135deg, #e74c3c, #c0392b);">
                        <h3>高频错误数</h3>
                        <p id="commonErrors" class="stat-number">0</p>
                        <p class="stat-desc">常见错误类型数量</p>
                    </div>
                </div>
            </section>

            <!-- 错误分析 -->
            <section class="card">
                <h2><i class="fas fa-chart-bar"></i> 错误类型分析</h2>
                <div class="chart-container">
                    <canvas id="errorTypeChart"></canvas>
                </div>
                <div class="chart-container" style="margin-top: 30px;">
                    <canvas id="experimentErrorChart"></canvas>
                </div>
            </section>

            <!-- 学生表现 -->
            <section class="card">
                <h2><i class="fas fa-user-graduate"></i> 学生表现分析</h2>
                <div class="chart-container">
                    <canvas id="studentPerformanceChart"></canvas>
                </div>
                <div id="studentList" class="student-list">
                    <!-- 学生列表动态生成 -->
                </div>
            </section>

            <!-- 详细记录 -->
            <section class="card">
                <h2><i class="fas fa-list-alt"></i> 详细分析记录</h2>
                <div class="filter-bar">
                    <select id="filterExperiment" onchange="filterRecords()">
                        <option value="">所有实验</option>
                        <option value="bridge">电桥测温电路</option>
                        <option value="thermistor">热敏电阻标定</option>
                        <option value="hall">霍尔测速实验</option>
                        <option value="photoelectric">光电报警电路</option>
                        <option value="strain">应变片测量</option>
                    </select>
                    <select id="filterDate" onchange="filterRecords()">
                        <option value="">所有时间</option>
                        <option value="today">今天</option>
                        <option value="week">本周</option>
                        <option value="month">本月</option>
                    </select>
                    <button onclick="exportData()" class="btn-report" style="padding: 8px 20px;">
                        <i class="fas fa-download"></i> 导出数据
                    </button>
                </div>
                <div id="recordsTable" class="records-table">
                    <!-- 记录表格动态生成 -->
                </div>
            </section>

            <!-- 教学建议 -->
            <section class="card">
                <h2><i class="fas fa-lightbulb"></i> 教学改进建议</h2>
                <div id="teachingSuggestions" class="suggestions-box">
                    <!-- 建议动态生成 -->
                </div>
            </section>
        </div>

        <footer>
            <p>教师学情看板 v1.0 | 数据来源：传感器仿真AI纠错助手</p>
            <p class="version">数据更新时间: <span id="updateTime">--:--:--</span></p>
        </footer>
    </div>

    <script>
        // 教师密码
        const TEACHER_PASSWORD = 'teacher123'; // 与script.js中保持一致
        
        // 全局变量
        let errorHistory = [];
        let charts = {};
        
        // 验证密码
        function verifyPassword() {
            const password = document.getElementById('teacherPassword').value;
            if (password === TEACHER_PASSWORD) {
                document.getElementById('passwordSection').style.display = 'none';
                document.getElementById('dashboardContent').style.display = 'block';
                loadDashboardData();
            } else {
                alert('密码错误！');
            }
        }
        
        // 加载仪表板数据
        function loadDashboardData() {
            // 从本地存储加载历史数据
            errorHistory = JSON.parse(localStorage.getItem('sensorErrorHistory')) || [];
            
            // 更新概览统计
            updateOverviewStats();
            
            // 更新图表
            updateCharts();
            
            // 更新详细记录
            updateRecordsTable();
            
            // 生成教学建议
            generateTeachingSuggestions();
            
            // 更新时间
            document.getElementById('updateTime').textContent = new Date().toLocaleTimeString();
        }
        
        // 更新概览统计
        function updateOverviewStats() {
            document.getElementById('totalAnalysis').textContent = errorHistory.length;
            
            // 统计不重复学生姓名
            const studentNames = [...new Set(errorHistory.map(item => item.studentName).filter(name => name))];
            document.getElementById('studentCount').textContent = studentNames.length;
            
            // 统计常见错误（假设错误类型超过3次为常见）
            const errorTypes = {};
            errorHistory.forEach(item => {
                const expType = item.experimentType;
                errorTypes[expType] = (errorTypes[expType] || 0) + 1;
            });
            
            const commonErrorCount = Object.values(errorTypes).filter(count => count >= 3).length;
            document.getElementById('commonErrors').textContent = commonErrorCount;
        }
        
        // 更新图表
        function updateCharts() {
            // 错误类型分布图
            const errorTypeData = analyzeErrorTypes();
            createErrorTypeChart(errorTypeData);
            
            // 实验项目错误分布
            const experimentData = analyzeExperimentErrors();
            createExperimentChart(experimentData);
            
            // 学生表现
            const studentData = analyzeStudentPerformance();
            createStudentPerformanceChart(studentData);
        }
        
        // 分析错误类型
        function analyzeErrorTypes() {
            const types = {
                '接线错误': 0,
                '参数错误': 0,
                '原理错误': 0,
                '仿真设置': 0,
                '其他错误': 0
            };
            
            errorHistory.forEach(item => {
                const text = item.result.toLowerCase();
                if (text.includes('接线') || text.includes('连接') || text.includes('短路') || text.includes('开路')) {
                    types['接线错误']++;
                } else if (text.includes('参数') || text.includes('电阻') || text.includes('电压') || text.includes('电容')) {
                    types['参数错误']++;
                } else if (text.includes('原理') || text.includes('理论') || text.includes('理解')) {
                    types['原理错误']++;
                } else if (text.includes('仿真') || text.includes('设置') || text.includes('配置')) {
                    types['仿真设置']++;
                } else {
                    types['其他错误']++;
                }
            });
            
            return types;
        }
        
        // 创建错误类型图表
        function createErrorTypeChart(data) {
            const ctx = document.getElementById('errorTypeChart').getContext('2d');
            
            if (charts.errorTypeChart) {
                charts.errorTypeChart.destroy();
            }
            
            charts.errorTypeChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(data),
                    datasets: [{
                        data: Object.values(data),
                        backgroundColor: [
                            '#3498db',
                            '#2ecc71',
                            '#e74c3c',
                            '#f39c12',
                            '#95a5a6'
                        ],
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        title: {
                            display: true,
                            text: '错误类型分布',
                            font: { size: 16 }
                        },
                        legend: {
                            position: 'bottom'
                        }
                    }
                }
            });
        }
        
        // 分析实验项目错误
        function analyzeExperimentErrors() {
            const experimentNames = {
                'bridge': '电桥测温',
                'thermistor': '热敏电阻',
                'hall': '霍尔测速',
                'photoelectric': '光电报警',
                'strain': '应变片'
            };
            
            const counts = {};
            errorHistory.forEach(item => {
                const exp = item.experimentType;
                if (exp) {
                    counts[exp] = (counts[exp] || 0) + 1;
                }
            });
            
            // 转换为显示名称
            const result = {};
            Object.keys(counts).forEach(key => {
                const displayName = experimentNames[key] || key;
                result[displayName] = counts[key];
            });
            
            return result;
        }
        
        // 创建实验项目图表
        function createExperimentChart(data) {
            const ctx = document.getElementById('experimentErrorChart').getContext('2d');
            
            if (charts.experimentChart) {
                charts.experimentChart.destroy();
            }
            
            charts.experimentChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: Object.keys(data),
                    datasets: [{
                        label: '错误次数',
                        data: Object.values(data),
                        backgroundColor: '#9b59b6',
                        borderColor: '#8e44ad',
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: {
                            beginAtZero: true,
                            title: {
                                display: true,
                                text: '错误次数'
                            }
                        },
                        x: {
                            title: {
                                display: true,
                                text: '实验项目'
                            }
                        }
                    },
                    plugins: {
                        title: {
                            display: true,
                            text: '各实验项目错误分布',
                            font: { size: 16 }
                        }
                    }
                }
            });
        }
        
        // 分析学生表现
        function analyzeStudentPerformance() {
            const studentData = {};
            
            errorHistory.forEach(item => {
                const student = item.studentName || '匿名';
                if (!studentData[student]) {
                    studentData[student] = { count: 0, recent: '' };
                }
                studentData[student].count++;
                studentData[student].recent = item.timestamp;
            });
            
            return studentData;
        }
        
        // 创建学生表现图表
        function createStudentPerformanceChart(data) {
            const ctx = document.getElementById('studentPerformanceChart').getContext('2d');
            
            if (charts.studentChart) {
                charts.studentChart.destroy();
            }
            
            // 取前10名学生
            const sortedStudents = Object.entries(data)
                .sort((a, b) => b[1].count - a[1].count)
                .slice(0, 10);
            
            charts.studentChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: sortedStudents.map(s => s[0]),
                    datasets: [{
                        label: '分析次数',
                        data: sortedStudents.map(s => s[1].count),
                        backgroundColor: '#2ecc71',
                        borderColor: '#27ae60',
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    indexAxis: 'y',
                    scales: {
                        x: {
                            beginAtZero: true,
                            title: {
                                display: true,
                                text: '使用次数'
                            }
                        }
                    },
                    plugins: {
                        title: {
                            display: true,
                            text: '学生使用频率TOP10',
                            font: { size: 16 }
                        }
                    }
                }
            });
            
            // 更新学生列表
            updateStudentList(sortedStudents);
        }
        
        // 更新学生列表
        function updateStudentList(students) {
            const container = document.getElementById('studentList');
            let html = '<div class="student-list-grid">';
            
            students.forEach(([name, data], index) => {
                html += `
                    <div class="student-item">
                        <div class="student-rank">${index + 1}</div>
                        <div class="student-info">
                            <div class="student-name">${name}</div>
                            <div class="student-stats">
                                <span>使用次数: ${data.count}</span>
                                <span>最近: ${formatDate(data.recent)}</span>
                            </div>
                        </div>
                    </div>
                `;
            });
            
            html += '</div>';
            container.innerHTML = html;
        }
        
        // 更新记录表格
        function updateRecordsTable() {
            const container = document.getElementById('recordsTable');
            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>时间</th>
                            <th>学生</th>
                            <th>实验项目</th>
                            <th>问题描述</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            const filteredRecords = filterRecords();
            
            filteredRecords.forEach(item => {
                html += `
                    <tr>
                        <td>${formatTime(item.timestamp)}</td>
                        <td>${item.studentName}</td>
                        <td>${getExperimentName(item.experimentType)}</td>
                        <td>${item.problemDesc?.substring(0, 30) || '无'}...</td>
                        <td>
                            <button onclick="viewRecord('${item.id}')" class="btn-small">
                                <i class="fas fa-eye"></i>
                            </button>
                        </td>
                    </tr>
                `;
            });
            
            html += `
                    </tbody>
                </table>
                <div class="table-footer">
                    共 ${filteredRecords.length} 条记录
                </div>
            `;
            
            container.innerHTML = html;
        }
        
        // 过滤记录
        function filterRecords() {
            const experimentFilter = document.getElementById('filterExperiment').value;
            const dateFilter = document.getElementById('filterDate').value;
            const now = new Date();
            
            return errorHistory.filter(item => {
                // 实验类型过滤
                if (experimentFilter && item.experimentType !== experimentFilter) {
                    return false;
                }
                
                // 时间过滤
                if (dateFilter) {
                    const recordDate = new Date(item.timestamp);
                    switch (dateFilter) {
                        case 'today':
                            return recordDate.toDateString() === now.toDateString();
                        case 'week':
                            const weekAgo = new Date(now - 7 * 24 * 60 * 60 * 1000);
                            return recordDate >= weekAgo;
                        case 'month':
                            const monthAgo = new Date(now);
                            monthAgo.setMonth(monthAgo.getMonth() - 1);
                            return recordDate >= monthAgo;
                        default:
                            return true;
                    }
                }
                
                return true;
            });
        }
        
        // 查看记录详情
        function viewRecord(id) {
            const item = errorHistory.find(h => h.id === id);
            if (!item) return;
            
            const detailHtml = `
                <div style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 1000;">
                    <div style="background: white; padding: 30px; border-radius: 10px; max-width: 800px; max-height: 80vh; overflow-y: auto; position: relative;">
                        <button onclick="closeModal()" style="position: absolute; top: 10px; right: 10px; background: none; border: none; font-size: 1.5rem; cursor: pointer;">×</button>
                        <h2>详细分析记录</h2>
                        <p><strong>学生:</strong> ${item.studentName}</p>
                        <p><strong>实验:</strong> ${getExperimentName(item.experimentType)}</p>
                        <p><strong>时间:</strong> ${item.timestamp}</p>
                        <p><strong>问题:</strong> ${item.problemDesc}</p>
                        <hr>
                        <div style="margin-top: 20px;">
                            ${item.result.replace(/\n/g, '<br>')}
                        </div>
                    </div>
                </div>
            `;
            
            document.body.insertAdjacentHTML('beforeend', detailHtml);
        }
        
        // 关闭模态框
        function closeModal() {
            const modal = document.querySelector('div[style*="position: fixed"]');
            if (modal) modal.remove();
        }
        
        // 生成教学建议
        function generateTeachingSuggestions() {
            const container = document.getElementById('teachingSuggestions');
            const errorTypes = analyzeErrorTypes();
            const total = errorHistory.length;
            
            let suggestions = '';
            
            if (total === 0) {
                suggestions = '<p>暂无足够数据生成教学建议，请鼓励学生更多使用系统。</p>';
            } else {
                // 找出最常见的错误类型
                const mostCommonError = Object.entries(errorTypes)
                    .sort((a, b) => b[1] - a[1])[0];
                
                suggestions = `
                    <div class="suggestion-card">
                        <h3><i class="fas fa-exclamation-triangle"></i> 重点问题关注</h3>
                        <p>学生最常见的错误类型是 <strong>${mostCommonError[0]}</strong>，占比 ${Math.round(mostCommonError[1]/total*100)}%。</p>
                        <p>建议在后续教学中重点讲解相关知识点。</p>
                    </div>
                `;
                
                // 时间分布建议
                const today = new Date();
                const todayRecords = errorHistory.filter(item => {
                    const recordDate = new Date(item.timestamp);
                    return recordDate.toDateString() === today.toDateString();
                }).length;
                
                if (todayRecords > 5) {
                    suggestions += `
                        <div class="suggestion-card">
                            <h3><i class="fas fa-clock"></i> 教学时机建议</h3>
                            <p>今天已有 ${todayRecords} 次分析请求，学生参与度较高。</p>
                            <p>建议利用这个时机进行集中答疑或专题讲解。</p>
                        </div>
                    `;
                }
                
                // 个性化辅导建议
                const studentData = analyzeStudentPerformance();
                const frequentUsers = Object.entries(studentData)
                    .filter(([name, data]) => data.count >= 5);
                
                if (frequentUsers.length > 0) {
                    suggestions += `
                        <div class="suggestion-card">
                            <h3><i class="fas fa-user-friends"></i> 个性化辅导</h3>
                            <p>以下学生使用系统较频繁，可能需要额外关注：</p>
                            <ul>
                                ${frequentUsers.map(([name, data]) => `<li>${name}（${data.count}次）</li>`).join('')}
                            </ul>
                        </div>
                    `;
                }
            }
            
            container.innerHTML = suggestions;
        }
        
        // 导出数据
        function exportData() {
            const dataStr = JSON.stringify(errorHistory, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `传感器教学数据_${new Date().toISOString().slice(0, 10)}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            alert('数据导出成功！');
        }
        
        // 工具函数
        function getExperimentName(type) {
            const names = {
                'bridge': '电桥测温电路',
                'thermistor': '热敏电阻标定',
                'hall': '霍尔测速实验',
                'photoelectric': '光电报警电路',
                'strain': '应变片测量'
            };
            return names[type] || type;
        }
        
        function formatTime(timestamp) {
            if (!timestamp) return '';
            const date = new Date(timestamp);
            return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }
        
        function formatDate(timestamp) {
            if (!timestamp) return '';
            const date = new Date(timestamp);
            return date.toLocaleDateString();
        }
        
        // 自动刷新
        setInterval(() => {
            if (document.getElementById('dashboardContent').style.display !== 'none') {
                const oldCount = errorHistory.length;
                errorHistory = JSON.parse(localStorage.getItem('sensorErrorHistory')) || [];
                if (errorHistory.length !== oldCount) {
                    loadDashboardData();
                }
            }
        }, 30000); // 每30秒检查一次更新
        
        // 样式增强
        const style = document.createElement('style');
        style.textContent = `
            .stats-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                gap: 20px;
                margin: 20px 0;
            }
            
            .stat-card {
                padding: 20px;
                border-radius: 10px;
                color: white;
                text-align: center;
            }
            
            .stat-number {
                font-size: 2.5rem;
                font-weight: bold;
                margin: 10px 0;
            }
            
            .stat-desc {
                font-size: 0.9rem;
                opacity: 0.9;
            }
            
            .chart-container {
                position: relative;
                height: 300px;
                margin: 20px 0;
            }
            
            .student-list-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
                gap: 15px;
                margin-top: 20px;
            }
            
            .student-item {
                display: flex;
                align-items: center;
                padding: 15px;
                background: #f8f9fa;
                border-radius: 8px;
                border-left: 4px solid #3498db;
            }
            
            .student-rank {
                font-size: 1.5rem;
                font-weight: bold;
                color: #3498db;
                margin-right: 15px;
                min-width: 40px;
                text-align: center;
            }
            
            .student-name {
                font-weight: bold;
                margin-bottom: 5px;
            }
            
            .student-stats {
                font-size: 0.9rem;
                color: #666;
                display: flex;
                justify-content: space-between;
            }
            
            .filter-bar {
                display: flex;
                gap: 10px;
                margin: 20px 0;
                flex-wrap: wrap;
            }
            
            .filter-bar select {

            table th {

                font-weight: 600;
                color: #2c3e50;

            table tr:hover {
